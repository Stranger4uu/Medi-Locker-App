name: medi_locker
description: "Medi Locker - Your secure health vault with AI guide"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # File handling
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  encrypt: ^5.0.3
  path_provider: ^2.1.4

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  pinput: ^5.0.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/